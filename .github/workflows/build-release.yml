# LodestarAgent.exe 자동 빌드·릴리스 — windows 러너가 Seobuk/lodestar(공개)의
# 최신 agent/ 소스를 체크아웃해 빌드한다. 집/학교 PC에서 수동 빌드 불필요.
#
# 릴리스 절차: lodestar repo에서 agent/version.py 올려 main 머지
#   → 이 저장소 Actions 탭에서 build-release "Run workflow" (또는 vX.Y.Z 태그 푸시)
# 태그는 agent/version.py 값으로 자동 결정되고(v{VERSION}), 이미 같은 버전
# 릴리스가 있으면 실패한다(중복 방지 — 재릴리스는 기존 릴리스 삭제 후).
name: build-release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      # 소스 원본은 Seobuk/lodestar의 agent/ — 이 저장소의 사본이 아니라
      # 항상 lodestar main 기준으로 빌드한다(사본 동기화 지연 무관).
      - uses: actions/checkout@v4
        with:
          repository: Seobuk/lodestar
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 릴리스 태그 결정 (agent/version.py 기준)
        id: ver
        shell: python
        run: |
          import os, re
          src = open("agent/version.py", encoding="utf-8").read()
          ver = re.search(r'VERSION = "([^"]+)"', src).group(1)
          ref = os.environ.get("GITHUB_REF", "")
          ref_name = os.environ.get("GITHUB_REF_NAME", "")
          if ref.startswith("refs/tags/"):
              # 태그 트리거 — lodestar main의 버전과 불일치하면 잘못된 릴리스 차단
              assert ref_name.lstrip("v") == ver, \
                  f"agent/version.py({ver}) != tag({ref_name}) — lodestar main에 버전 올렸는지 확인"
              tag = ref_name
          else:
              # workflow_dispatch — gh release create가 태그까지 만들어 준다
              tag = f"v{ver}"
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"tag={tag}\n")

      - name: 빌드 (build.bat과 동일 절차)
        working-directory: agent
        run: |
          pip install -r requirements.txt pyinstaller
          python robot_icon.py icon.ico
          pyinstaller --noconfirm --onefile --windowed --name LodestarAgent --icon icon.ico --hidden-import pystray._win32 main.py

      - name: 릴리스 생성 + exe 첨부
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: >
          gh release create "$env:TAG" agent/dist/LodestarAgent.exe
          --repo "$env:GITHUB_REPOSITORY"
          --title "$env:TAG"
          --notes "자동 빌드(Seobuk/lodestar main 기준). 에이전트가 6시간 주기로 자가 업데이트합니다."
